<!DOCTYPE html>
<html>
<head>
    <title>ClinConNet Wallet</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body class="wallet-popup">
    <header class="header">
        <img src="../icons/icon48.png" alt="Logo" class="header-logo">
        <h1>ClinConNet Wallet</h1>
    </header>
    <section class="main-content">
        <h2>Status</h2>
        <div id="status" class="status-display">Loading...</div>
        <h2>Public DID</h2>
        <span id="publicDid" class="code-block">N/A</span>
        <button id="copyDidBtn" class="button-copy-did" title="Copy Full DID">Copy</button> <div id="recentPeerDidsContainer">
             <h2>Recent Peer DIDs</h2>
             <ul id="peerDidList" class="peer-did-list"></ul>
        </div>
        <hr>
        <h2>Actions</h2>
        <div class="button-group">
            <button id="createPeerDidBtn" class="button-primary">Create New DID</button>
            <button id="showAllDidsBtn" class="button-secondary">Show All DIDs</button>
            </div>
        <hr>
        <section id="didAuthSection">
            <h2>DID Authentication</h2>
            <p>Paste OIDC Auth Request (JSON):</p>
            <textarea id="oidcRequestInput" rows="8" placeholder='Example: {"response_type":"id_token","scope":"openid","client_id":"YOUR_RP_CLIENT_ID","redirect_uri":"YOUR_RP_CALLBACK_URL","nonce":"..."}'></textarea>
            <div class="button-group">
                <button id="didAuthBtn" class="button-primary">Authenticate</button>
            </div>
        </section>
    </section>
    <script src="popup.js"></script>
</body>
</html>
