<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Consent Request</title>
    <link rel="stylesheet" href="messages.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <img src="../icons/icon48.png" alt="Logo" class="header-logo">
            <h1>Consent Request</h1>
        </header>

        <div id="formContainer" class="card">
            </div>
        
        <div id="actionsContainer" class="card">
            <h3>Actions</h3>
            <div id="verificationStatus" class="status-display">Signature not verified.</div>
            <button id="verifySignatureBtn" class="button">Check Signature</button>
            <hr>
            <button id="signBtn" class="button-primary" disabled>Sign</button>
            <button id="generateProofBtn" class="button-primary" disabled>Generate Consent Proof</button>
        </div>
        
        <div id="proofContainer" class="card" style="display: none;">
            <h3>Consent Proof (SHA-256 Hash)</h3>
            <pre id="proofOutput" style="word-break: break-all;"></pre>
            <button id="copyProofBtn" class="button">Copy Proof</button>
            <p style="font-size: 0.9em; margin-top: 15px;">Please submit this proof to the ClinConNet web portal to receive a Transaction Reference.</p>
        </div>

        <div id="sendResponseContainer" class="card" style="display: none;">
            <h3>Send Final Consent to Organization</h3>
            <div class="form-group">
                <label for="txRefInput">Paste Consent Proof TX Reference from Portal:</label>
                <input type="text" id="txRefInput" placeholder="0x..." required>
            </div>
            <button id="sendResponseBtn" class="button-primary">Send back the Consent and Consent Proof</button>
            <div id="sendResponseStatus" class="status-display" style="margin-top:15px;"></div>
        </div>
    </div>
    <script src="form-display.js"></script>
</body>
</html>
