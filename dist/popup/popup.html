<!DOCTYPE html>
<html>
<head>
    <title>ClinConNet Wallet</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body class="wallet-popup">

    <header class="header">
        <img src="../icons/icon48.png" alt="Logo" class="header-logo">
        <h1>ClinConNet Wallet</h1>
    </header>

    <section class="main-content">
        <h2>Status</h2>
        <div id="status" class="status-display">Loading...</div>

        <h2>Public DID</h2>
        <span id="publicDid" class="code-block">N/A</span>
        <button id="copyDidBtn" class="button-copy-did" title="Copy Full DID">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16"> <path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1v-1z"/> <path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3zM-1 1.5A1.5 1.5 0 0 1 0 0h4a1.5 1.5 0 0 1 1.5 1.5v1A1.5 1.5 0 0 1 4 4h-4A1.5 1.5 0 0 1-1 2.5v-1zm10 0A1.5 1.5 0 0 1 10 0h4a1.5 1.5 0 0 1 1.5 1.5v1A1.5 1.5 0 0 1 14 4h-4A1.5 1.5 0 0 1 9 2.5v-1z"/> </svg>
            Copy Full DID
        </button>

        <div id="recentPeerDidsContainer">
             <h2>Recent Peer DIDs</h2>
             <ul id="peerDidList" class="peer-did-list"></ul>
        </div>

        <hr>

        <h2>Actions</h2>
        <div class="button-group">
            <button id="createPeerDidBtn" class="button-primary">Create Peer DID</button>
            <button id="showAllDidsBtn" class="button-secondary">Show All DIDs</button>
        </div>

    </section>

    <section id="didListContainer" class="did-list-section" style="display: none;">
        <h2>Managed DIDs</h2>
        <ul id="didList"></ul>
    </section>

    <script src="popup.js"></script>
</body>
</html>
